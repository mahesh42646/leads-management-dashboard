<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Leads Management Dashboard</title>
      <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
                .container { max-width: 1200px; margin: 0 auto; }
                header { background: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
                header h1 { color: #333; margin-bottom: 10px; }
                header p { color: #666; font-size: 14px; }
                .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
                .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
                .stat-label { color: #666; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; }
                .stat-value { font-size: 32px; font-weight: bold; color: #333; }
                .table-wrapper { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
                table { width: 100%; border-collapse: collapse; }
                th { background: #f5f5f5; padding: 15px; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #e0e0e0; }
                td { padding: 15px; border-bottom: 1px solid #e0e0e0; }
                tr:hover { background: #fafafa; }
                .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
                .status-hot { background: #ffebee; color: #c62828; }
                .status-qualified { background: #e8f5e9; color: #2e7d32; }
                .status-contacted { background: #e3f2fd; color: #1565c0; }
                .status-lead { background: #f3e5f5; color: #6a1b9a; }
                .loading { text-align: center; padding: 40px; color: white; }
            </style>
  </head>
  <body>
        <div class="container">
                  <header>
                                <h1>📊 Leads Management Dashboard</h1>
                              <p>Real-time lead tracking powered by Google Sheets</p>
                  </header>
                
                <div class="stats" id="statsContainer"></div>div>
                
                <div class="table-wrapper">
                            <table id="leadsTable">
                                            <thead>
                                                                  <tr>
                                                                                            <th>Name</th>
                                                                    <th>Email</th>
                                                                    <th>Phone</th>
                                                                    <th>Company</th>
                                                                    <th>Status</th>
                                                                    <th>Value</th>
                                                                  </tr>
                                            </thead>
                                            <tbody id="leadsBody">
                                                <tr><td colspan="6" style="text-align:center; padding: 40px; color: #999;">Loading leads...</td>td></tr>
                                            </tbody>tbody>
                            </table>table>
                </div>div>
        </div>div>
  
      <script>
                const SHEET_ID = '1lo-lrxeWFHz3Ebnxp0MdsvGlfEqofKPiZf6lmNN8h98';
                const API_KEY = 'AIzaSyDKNWTHJI_3fnBXWy2neLKMjzMmLPwPBJQ';
                const SHEET_NAME = 'Sheet1';

                async function loadLeads() {
                              try {
                                                const response = await fetch(
                                                                      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A2:G?key=${API_KEY}`
                                                                  );
                                                const data = await response.json();
                                                const leads = data.values || [];

                                                displayLeads(leads);
                                                updateStats(leads);
                              } catch (error) {
                                                console.error('Error loading leads:', error);
                                                document.getElementById('leadsBody').innerHTML = 
                                                                      '<tr><td colspan="6" style="text-align:center; color: red; padding: 20px;">Error loading data. Please refresh the page.</td></tr>';
                              }
                }

                function displayLeads(leads) {
                              const tbody = document.getElementById('leadsBody');
                              tbody.innerHTML = leads.map(lead => `
                                              <tr>
                                                                  <td>${lead[1] || ''}</td>
                                                                                      <td>${lead[2] || ''}</td>
                                                                                                          <td>${lead[3] || ''}</td>
                                                                                                                              <td>${lead[4] || ''}</td>
                                                                                                                                                  <td><span class="status-badge status-${lead[5]?.toLowerCase().replace(/\s+/g, '-') || 'lead'}">${lead[5] || ''}</span></td>
                                                                                                                                                                      <td>${lead[6] || ''}</td>
                                                                                                                                                                                      </tr>
                                                                                                                                                                                                  `).join('') || '<tr><td colspan="6" style="text-align:center; color: #999;">No leads found</td></tr>';
                }

                function updateStats(leads) {
                              const hotLeads = leads.filter(l => l[5] === 'Hot Lead').length;
                              const qualified = leads.filter(l => l[5] === 'Qualified').length;
                              const totalValue = leads.reduce((sum, l) => {
                                                const val = parseInt((l[6] || '0').replace(/[^0-9]/g, '')) || 0;
                                                return sum + val;
                              }, 0);

                              document.getElementById('statsContainer').innerHTML = `
                                              <div class="stat-card">
                                                                  <div class="stat-label">Total Leads</div>
                                                                                      <div class="stat-value">${leads.length}</div>
                                                                                                      </div>
                                                                                                                      <div class="stat-card">
                                                                                                                                          <div class="stat-label">Hot Leads</div>
                                                                                                                                                              <div class="stat-value" style="color: #d32f2f;">${hotLeads}</div>
                                                                                                                                                                              </div>
                                                                                                                                                                                              <div class="stat-card">
                                                                                                                                                                                                                  <div class="stat-label">Qualified</div>
                                                                                                                                                                                                                                      <div class="stat-value" style="color: #388e3c;">${qualified}</div>
                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                      <div class="stat-card">
                                                                                                                                                                                                                                                                                          <div class="stat-label">Total Value</div>
                                                                                                                                                                                                                                                                                                              <div class="stat-value" style="color: #1976d2;">$${totalValue.toLocaleString()}</div>
                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                          `;
                }

                // Load leads on page load
                loadLeads();
                // Refresh every 30 seconds
                setInterval(loadLeads, 30000);
      </script>
  </body>
</html>html>
      </script></tr></th></th>
                                                                  </tr>
                                            </thead></p></h1>
                  </header>
  </body>
      </style></title>
  </head>
